    /* ─── Render ───────────────────────────────────────────────────────── */
    var params = new URLSearchParams(window.location.search);
    var slug = params.get('slug');
    var article = articles[slug];

    if (!article) {
      window.location.href = '/news.html';
      return;
    }

    document.title = 'OKUBI — ' + article.title;

    document.getElementById('articleHeroBg').style.backgroundImage = "url('" + article.image + "')";
    document.getElementById('articleTitle').textContent = article.title;
    document.getElementById('articleCategory').textContent = article.category;
    document.getElementById('articleDate').textContent = article.date;

    var contentEl = document.getElementById('articleContent');
    article.content.forEach(function(block) {
      if (block.type === 'text') {
        var p = document.createElement('p');
        p.className = 'article-body__text';
        p.textContent = block.value;
        contentEl.appendChild(p);
      } else if (block.type === 'heading') {
        var h2 = document.createElement('h2');
        h2.className = 'article-body__heading';
        h2.textContent = block.value;
        contentEl.appendChild(h2);
      } else if (block.type === 'list') {
        var ul = document.createElement('ul');
        ul.className = 'article-body__list';
        block.value.forEach(function(item) {
          var li = document.createElement('li');
          li.textContent = item;
          ul.appendChild(li);
        });
        contentEl.appendChild(ul);
      }
    });
  })();
  </script>

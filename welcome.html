<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OKUBI — Welcome!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0908;
      --surface: #141210;
      --gold: #d4a853;
      --beige: #d6c8a8;
      --muted: #9a8e7a;
      --green: #4ec870;
      --font-display: 'Orbitron', sans-serif;
      --font-heading: 'Rajdhani', sans-serif;
      --font-body: 'Inter', sans-serif;
    }
    body {
      background: var(--bg);
      color: var(--beige);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .welcome {
      text-align: center;
      max-width: 520px;
      padding: 60px 40px;
      background: var(--surface);
      border: 1px solid rgba(212, 168, 83, 0.15);
      border-radius: 8px;
    }
    .welcome__check {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: rgba(78, 200, 112, 0.1);
      border: 2px solid var(--green);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .welcome__check svg { color: var(--green); }
    .welcome__title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }
    .welcome__sub {
      font-family: var(--font-heading);
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 40px;
    }
    .welcome__gift-box {
      background: rgba(212, 168, 83, 0.06);
      border: 1px solid rgba(212, 168, 83, 0.2);
      border-radius: 6px;
      padding: 28px 24px;
      margin-bottom: 20px;
    }
    .welcome__gem-icon {
      font-size: 2rem;
      margin-bottom: 8px;
    }
    .welcome__gem-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 4px;
    }
    .welcome__gem-desc {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 20px;
    }
    .welcome__input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(10, 9, 8, 0.8);
      border: 1px solid rgba(212, 168, 83, 0.25);
      border-radius: 4px;
      color: var(--beige);
      font-family: var(--font-body);
      font-size: 0.9rem;
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.3s;
    }
    .welcome__input:focus {
      border-color: var(--gold);
    }
    .welcome__input::placeholder {
      color: var(--muted);
    }
    .welcome__claim-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #d4a853, #b8912e);
      border: none;
      border-radius: 4px;
      color: #0a0908;
      font-family: var(--font-heading);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.3s;
    }
    .welcome__claim-btn:hover { opacity: 0.85; }
    .welcome__claim-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .welcome__skip {
      display: inline-block;
      margin-top: 18px;
      color: var(--muted);
      font-family: var(--font-heading);
      font-size: 0.85rem;
      text-decoration: none;
      transition: color 0.3s;
    }
    .welcome__skip:hover { color: var(--beige); }
    .welcome__success {
      display: none;
      color: var(--green);
      font-family: var(--font-heading);
      font-size: 1rem;
      font-weight: 600;
      margin-top: 12px;
    }
    .welcome__error {
      display: none;
      color: #e85454;
      font-family: var(--font-heading);
      font-size: 0.85rem;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="welcome">
    <div class="welcome__check">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <h1 class="welcome__title">Login Successful!</h1>
    <p class="welcome__sub">Welcome to OKUBI, warrior.</p>

    <div class="welcome__gift-box" id="giftBox">
      <div class="welcome__gem-icon">💎</div>
      <div class="welcome__gem-title">500 Gems + 500 Void Pearls</div>
      <p class="welcome__gem-desc">Enter your email below to claim your welcome gift.</p>
      <input type="email" class="welcome__input" id="emailInput" placeholder="Enter your email" />
      <button class="welcome__claim-btn" id="claimBtn">Claim Welcome Gift</button>
      <div class="welcome__error" id="errorMsg"></div>
      <div class="welcome__success" id="successMsg">Gift claimed! Redirecting...</div>
    </div>

    <a href="/" class="welcome__skip">Continue without claiming gift →</a>
  </div>

  <script>
    const claimBtn = document.getElementById('claimBtn');
    const emailInput = document.getElementById('emailInput');
    const successMsg = document.getElementById('successMsg');
    const errorMsg = document.getElementById('errorMsg');

    claimBtn.addEventListener('click', async () => {
      const email = emailInput.value.trim();
      if (!email || !email.includes('@')) {
        errorMsg.textContent = 'Please enter a valid email.';
        errorMsg.style.display = 'block';
        return;
      }
      claimBtn.disabled = true;
      errorMsg.style.display = 'none';
      try {
        const resp = await fetch('/auth/claim-welcome-gift', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await resp.json();
        if (data.ok) {
          successMsg.style.display = 'block';
          claimBtn.style.display = 'none';
          emailInput.style.display = 'none';
          setTimeout(() => { window.location.href = '/'; }, 2000);
        } else {
          errorMsg.textContent = data.error || 'Something went wrong.';
          errorMsg.style.display = 'block';
          claimBtn.disabled = false;
        }
      } catch (e) {
        errorMsg.textContent = 'Network error. Try again.';
        errorMsg.style.display = 'block';
        claimBtn.disabled = false;
      }
    });
  </script>
</body>
</html>

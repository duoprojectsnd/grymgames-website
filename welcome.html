<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OKUBI — Welcome!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0908;
      --surface: rgba(14, 12, 10, 0.85);
      --gold: #d4a853;
      --beige: #d6c8a8;
      --muted: #9a8e7a;
      --green: #4ec870;
      --purple: #7b2ff2;
      --purple-light: #9b59b6;
      --font-display: 'Orbitron', sans-serif;
      --font-heading: 'Rajdhani', sans-serif;
      --font-body: 'Inter', sans-serif;
    }
    body {
      background: var(--bg);
      color: var(--beige);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow: hidden;
    }
    /* Hero background */
    .hero-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      animation: heroZoomFade 1.8s ease-out forwards;
    }
    .hero-bg img {
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scale(1.08);
      animation: heroZoom 2.5s ease-out 0.2s forwards;
    }
    @keyframes heroZoom {
      to { transform: scale(1); }
    }
    @keyframes heroZoomFade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .hero-bg::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at center, rgba(10,9,8,0.5) 0%, rgba(10,9,8,0.85) 70%, rgba(10,9,8,0.95) 100%);
    }
    /* Diamond (losange) dark vignette in center for readability */
    .hero-bg::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 80vh; height: 80vh;
      transform: translate(-50%, -50%) rotate(45deg);
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.15) 40%, transparent 70%);
      z-index: 1;
      pointer-events: none;
    }

    .welcome {
      position: relative;
      z-index: 1;
      text-align: center;
      width: 90%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px;
      animation: contentFadeUp 1s ease-out 0.4s both;
    }
    @keyframes contentFadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Green checkmark */
    .welcome__check {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4ec870, #3baa57);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      box-shadow: 0 0 30px rgba(78, 200, 112, 0.35);
      animation: checkPop 0.5s ease-out 0.8s both;
    }
    .welcome__check svg {
      width: 32px; height: 32px;
      stroke: #fff;
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    @keyframes checkPop {
      from { transform: scale(0); opacity: 0; }
      60%  { transform: scale(1.15); opacity: 1; }
      to   { transform: scale(1); opacity: 1; }
    }

    .welcome__title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.6rem);
      font-weight: 800;
      color: var(--gold);
      margin-bottom: 6px;
      letter-spacing: 0.06em;
      text-shadow: 0 0 30px rgba(212, 168, 83, 0.3);
      width: 60vw;
      min-width: 300px;
      transform: translateY(-12px);
    }
    .welcome__sub {
      font-family: var(--font-heading);
      font-size: 1.15rem;
      color: var(--muted);
      margin-bottom: 10px;
      transform: translateY(-12px);
    }
    .welcome__gift-teaser {
      font-family: var(--font-display);
      font-size: clamp(1.4rem, 3.5vw, 2.2rem);
      font-weight: 700;
      color: #c9a0ff;
      margin-bottom: 32px;
      letter-spacing: 0.04em;
      text-shadow: 0 0 20px rgba(123, 47, 242, 0.4);
      opacity: 0;
      animation: teaserAppear 0.5s ease-out 1.2s forwards;
    }
    @keyframes teaserAppear {
      from { opacity: 0; transform: translateY(12px) scale(0.9); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .welcome__gift-box {
      background: none;
      border: none;
      border-radius: 10px;
      padding: 32px 28px;
      max-width: 440px;
      width: 100%;
      position: relative;
      animation: giftBoxAppear 0.4s ease-out 1.5s both;
    }
    /* Purple glow POW — fades in fast, out slow */
    .welcome__gift-box::before {
      content: '';
      position: absolute;
      top: -2px; left: -2px; right: -2px; bottom: -2px;
      border-radius: 12px;
      background: radial-gradient(ellipse at center, rgba(123, 47, 242, 0.6) 0%, rgba(155, 89, 182, 0.3) 40%, transparent 70%);
      z-index: -1;
      animation: purplePow 2s ease-out 2.3s both;
      pointer-events: none;
    }
    @keyframes purplePow {
      0%   { opacity: 0; transform: scale(0.8); }
      15%  { opacity: 1; transform: scale(1.15); }
      30%  { transform: scale(1.05); }
      100% { opacity: 0; transform: scale(1.2); }
    }
    @keyframes giftBoxAppear {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .welcome__gem-icon {
      font-size: 2.4rem;
      margin-bottom: 10px;
    }
    .welcome__gem-title {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      color: #c9a0ff;
      margin-bottom: 6px;
      text-shadow: 0 0 15px rgba(123, 47, 242, 0.4);
    }
    .welcome__gem-desc {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 22px;
    }
    .welcome__input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(10, 9, 8, 0.8);
      border: 1px solid rgba(123, 47, 242, 0.25);
      border-radius: 5px;
      color: var(--beige);
      font-family: var(--font-body);
      font-size: 0.9rem;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.3s, box-shadow 0.3s;
      opacity: 0;
      animation: inputAppear 0.35s ease-out 1.8s forwards, inputGlow 1.5s ease-in-out 1.8s forwards;
    }
    @keyframes inputAppear {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes inputGlow {
      0%   { box-shadow: none; }
      40%  { box-shadow: 0 0 20px rgba(123, 47, 242, 0.5), 0 0 40px rgba(123, 47, 242, 0.2); border-color: var(--purple); }
      100% { box-shadow: none; border-color: rgba(123, 47, 242, 0.25); }
    }
    .welcome__input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 12px rgba(123, 47, 242, 0.2);
    }
    .welcome__input::placeholder {
      color: var(--muted);
    }
    .welcome__claim-btn {
      width: 85%;
      padding: 13px 16px;
      background: linear-gradient(135deg, #7b2ff2, #9b59b6, #7b2ff2);
      background-size: 200% 200%;
      animation: vpBuyShimmer 3s ease infinite, btnAppear 0.35s ease-out 2.05s both;
      border: none;
      border-radius: 5px;
      color: #fff;
      font-family: var(--font-heading);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 25px rgba(123, 47, 242, 0.35);
      position: relative;
      overflow: hidden;
      opacity: 0;
    }
    @keyframes btnAppear {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .welcome__claim-btn::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
      animation: btnGlow 3s ease-in-out infinite;
    }
    .welcome__claim-btn:hover {
      box-shadow: 0 6px 40px rgba(123, 47, 242, 0.55);
      transform: translateY(-2px);
    }
    .welcome__claim-btn:active {
      transform: translateY(0);
    }
    .welcome__claim-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    @keyframes vpBuyShimmer {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes btnGlow {
      0%, 100% { opacity: 0; transform: translate(0, 0); }
      50% { opacity: 1; transform: translate(10%, 10%); }
    }
    .welcome__skip {
      display: inline-block;
      margin-top: 24px;
      color: var(--muted);
      font-family: var(--font-heading);
      font-size: 0.85rem;
      text-decoration: none;
      transition: color 0.3s;
      opacity: 0;
      animation: skipAppear 0.35s ease-out 2.5s forwards;
    }
    @keyframes skipAppear {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .welcome__skip:hover { color: var(--beige); }
    .welcome__success {
      display: none;
      color: var(--green);
      font-family: var(--font-heading);
      font-size: 1rem;
      font-weight: 600;
      margin-top: 14px;
    }
    .welcome__error {
      display: none;
      color: #e85454;
      font-family: var(--font-heading);
      font-size: 0.85rem;
      margin-top: 10px;
    }

    @media (max-width: 540px) {
      .welcome { padding: 28px 12px; }
      .welcome__title { font-size: clamp(1.4rem, 6vw, 2rem); width: 80vw; }
      .welcome__check { width: 50px; height: 50px; }
      .welcome__check svg { width: 26px; height: 26px; }
    }
  </style>
</head>
<body>
  <div class="hero-bg">
    <img src="assets/home/hero.png" alt="" />
  </div>

  <div class="welcome">
    <div class="welcome__check">
      <svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6" /></svg>
    </div>
    <h1 class="welcome__title">Login Successful!</h1>
    <p class="welcome__sub">Welcome to OKUBI, warrior.</p>
    <p class="welcome__gift-teaser">Here's a gift!</p>

    <div class="welcome__gift-box" id="giftBox">
      <div class="welcome__gem-icon">💎</div>
      <div class="welcome__gem-title">500 Void Pearls</div>
      <p class="welcome__gem-desc">Enter your email below to claim your welcome gift.</p>
      <input type="email" class="welcome__input" id="emailInput" placeholder="Enter your email" />
      <button class="welcome__claim-btn" id="claimBtn">Claim 500 Void Pearls</button>
      <div class="welcome__error" id="errorMsg"></div>
      <div class="welcome__success" id="successMsg">Check your email to confirm and claim your gift!</div>
      <a href="/" class="welcome__skip">Continue without claiming gift →</a>
    </div>
  </div>

  <script>
    const claimBtn = document.getElementById('claimBtn');
    const emailInput = document.getElementById('emailInput');
    const successMsg = document.getElementById('successMsg');
    const errorMsg = document.getElementById('errorMsg');

    let claiming = false;
    claimBtn.addEventListener('click', async () => {
      if (claiming) return;
      const email = emailInput.value.trim();
      const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
      if (!emailRe.test(email)) {
        errorMsg.textContent = 'Please enter a valid email.';
        errorMsg.style.display = 'block';
        return;
      }
      claiming = true;
      claimBtn.disabled = true;
      errorMsg.style.display = 'none';
      try {
        const resp = await fetch('/auth/claim-welcome-gift', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await resp.json();
        if (data.ok) {
          if (data.already_claimed) {
            successMsg.textContent = 'Gift already claimed!';
            successMsg.style.display = 'block';
            claimBtn.style.display = 'none';
            emailInput.style.display = 'none';
            setTimeout(() => { window.location.href = '/'; }, 2000);
          } else {
            successMsg.style.display = 'block';
            claimBtn.style.display = 'none';
            emailInput.style.display = 'none';
          }
        } else {
          errorMsg.textContent = data.error || 'Something went wrong.';
          errorMsg.style.display = 'block';
          claimBtn.disabled = false;
          claiming = false;
        }
      } catch (e) {
        errorMsg.textContent = 'Network error. Try again.';
        errorMsg.style.display = 'block';
        claimBtn.disabled = false;
        claiming = false;
      }
    });
  </script>
</body>
</html>

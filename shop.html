<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OKUBI — Item Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0908;
      --surface: #141210;
      --surface-2: #1a1714;
      --border: rgba(212, 168, 83, 0.15);
      --border-hover: rgba(212, 168, 83, 0.35);
      --gold: #d4a853;
      --beige: #d6c8a8;
      --muted: #9a8e7a;
      --purple: #c577f5;
      --purple-glow: rgba(180, 100, 255, 0.4);
      --blue: #4ea8ee;
      --red: #e85454;
      --green: #4ec870;
      --font-display: 'Orbitron', sans-serif;
      --font-heading: 'Rajdhani', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--beige);
      font-family: var(--font-body);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Top Bar ── */
    .shop-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      padding: 0 40px;
      height: 52px;
      background: rgba(10, 9, 8, 0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .shop-bar__left {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .shop-bar__back {
      font-family: var(--font-heading);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.3s;
    }
    .shop-bar__back:hover { color: var(--gold); }

    .shop-bar__title {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--beige);
    }

    .shop-bar__wallet {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--purple);
      padding: 6px 16px;
      border: 1px solid rgba(180, 100, 255, 0.3);
      border-radius: 4px;
      background: rgba(180, 100, 255, 0.06);
    }
    .shop-bar__wallet-icon {
      font-size: 0.9rem;
      text-shadow: 0 0 8px var(--purple-glow);
    }

    .shop-bar__wallet {
      margin-left: auto;
    }

    .shop-bar__right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .shop-bar__profile {
      position: relative;
      display: none;
    }
    .shop-bar__profile--active {
      display: block;
    }
    .shop-bar__profile-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 50%;
      padding: 0;
      cursor: pointer;
      width: 34px;
      height: 34px;
      overflow: hidden;
      transition: border-color 0.3s;
    }
    .shop-bar__profile-btn:hover {
      border-color: var(--border-hover);
    }
    .shop-bar__profile-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
    .shop-bar__profile-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 16px;
      min-width: 160px;
      z-index: 200;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .shop-bar__profile-dropdown--open {
      display: block;
    }
    .shop-bar__profile-name {
      display: block;
      font-family: var(--font-heading);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--beige);
      margin-bottom: 10px;
      letter-spacing: 0.04em;
    }
    .shop-bar__profile-link {
      display: block;
      font-family: var(--font-heading);
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      padding: 6px 0;
      letter-spacing: 0.06em;
      transition: color 0.2s;
    }
    .shop-bar__profile-link:hover {
      color: var(--gold);
    }

    /* ── Category Tabs (separate bar below top bar) ── */
    .shop-tabs-bar {
      position: fixed;
      top: 52px;
      left: 0;
      right: 0;
      z-index: 99;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 0 40px;
      height: 48px;
      background: rgba(10, 9, 8, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .shop-tabs {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .shop-search {
      position: absolute;
      right: 40px;
    }
    .shop-search__input {
      font-family: var(--font-heading);
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: var(--beige);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(212, 168, 83, 0.15);
      border-radius: 3px;
      padding: 10px 38px 10px 16px;
      width: 260px;
      outline: none;
      transition: all 0.3s;
    }
    .shop-search__input::placeholder {
      color: var(--muted);
      opacity: 0.6;
    }
    .shop-search__input:focus {
      border-color: rgba(212, 168, 83, 0.4);
      background: rgba(255,255,255,0.06);
      box-shadow: 0 0 12px rgba(212, 168, 83, 0.08);
      width: 320px;
    }
    .shop-search__icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.9rem;
      pointer-events: none;
    }

    .shop-tab {
      font-family: var(--font-heading);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: 1px solid transparent;
      border-radius: 3px;
      padding: 8px 20px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .shop-tab:hover {
      color: var(--beige);
      background: rgba(212, 168, 83, 0.06);
    }
    .shop-tab--active {
      color: var(--gold);
      border-color: rgba(212, 168, 83, 0.3);
      background: rgba(212, 168, 83, 0.08);
    }
    .shop-tab--disabled {
      color: rgba(255,255,255,0.3);
      cursor: not-allowed;
      pointer-events: none;
    }
    .shop-tab--gems {
      position: relative;
      overflow: visible;
      background: linear-gradient(135deg, rgba(100,40,160,0.4), rgba(160,60,200,0.25), rgba(80,180,220,0.2), rgba(140,50,180,0.4));
      background-size: 400% 400%;
      animation: vpPearlescent 4s ease infinite;
      border: 1px solid rgba(180, 100, 240, 0.45);
      color: #d9b3ff;
      text-shadow: 0 0 8px rgba(180, 100, 240, 0.4);
      box-shadow: 0 0 12px rgba(160, 80, 220, 0.15), inset 0 0 12px rgba(160, 80, 220, 0.08);
    }
    .shop-tab--gems:hover {
      border-color: rgba(200, 120, 255, 0.7);
      color: #e8ccff;
      text-shadow: 0 0 14px rgba(200, 120, 255, 0.6);
      box-shadow: 0 0 20px rgba(160, 80, 220, 0.3), inset 0 0 16px rgba(160, 80, 220, 0.12);
    }
    .shop-tab--gems.shop-tab--active {
      border-color: rgba(200, 120, 255, 0.8);
      color: #f0ddff;
      text-shadow: 0 0 16px rgba(200, 120, 255, 0.7);
      box-shadow: 0 0 24px rgba(160, 80, 220, 0.35), inset 0 0 18px rgba(160, 80, 220, 0.15);
    }
    @keyframes vpPearlescent {
      0%   { background-position: 0% 50%; }
      25%  { background-position: 100% 0%; }
      50%  { background-position: 100% 100%; }
      75%  { background-position: 0% 100%; }
      100% { background-position: 0% 50%; }
    }

    /* NEW badge */
    .vp-tab-badge {
      position: absolute;
      top: -8px;
      right: -10px;
      font-family: var(--font-heading);
      font-size: 0.55rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: #fff;
      background: linear-gradient(135deg, #e74c3c, #ff6b6b);
      padding: 2px 6px;
      border-radius: 3px;
      text-transform: uppercase;
      box-shadow: 0 0 8px rgba(231, 76, 60, 0.5);
      animation: vpBadgePulse 2s ease infinite;
      z-index: 5;
      pointer-events: none;
    }
    @keyframes vpBadgePulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.85; }
    }

    /* Floating stars */
    .vp-tab-stars {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      border-radius: 3px;
    }
    .vp-tab-star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #e0c0ff;
      border-radius: 50%;
      box-shadow: 0 0 4px rgba(200, 140, 255, 0.8);
      animation: vpStarFloat linear infinite;
      opacity: 0;
    }
    .vp-tab-star:nth-child(1) { left: 10%; animation-duration: 2.5s; animation-delay: 0s; }
    .vp-tab-star:nth-child(2) { left: 30%; animation-duration: 3s; animation-delay: 0.7s; width: 2px; height: 2px; }
    .vp-tab-star:nth-child(3) { left: 55%; animation-duration: 2.8s; animation-delay: 1.4s; }
    .vp-tab-star:nth-child(4) { left: 75%; animation-duration: 3.2s; animation-delay: 0.3s; width: 2px; height: 2px; }
    .vp-tab-star:nth-child(5) { left: 90%; animation-duration: 2.6s; animation-delay: 1.8s; }
    @keyframes vpStarFloat {
      0%   { bottom: -4px; opacity: 0; transform: scale(0.5); }
      20%  { opacity: 1; transform: scale(1); }
      80%  { opacity: 0.7; }
      100% { bottom: calc(100% + 4px); opacity: 0; transform: scale(0.3); }
    }

    /* Click burst on button */
    .vp-tab-burst {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 10;
      font-size: 1.4rem;
      color: #e0c0ff;
      text-shadow: 0 0 20px rgba(180, 100, 240, 0.9), 0 0 40px rgba(140, 60, 200, 0.6);
      opacity: 0;
      animation: vpBurst 0.7s ease-out forwards;
    }
    @keyframes vpBurst {
      0%   { opacity: 1; transform: translate(-50%, -50%) scale(0.3); }
      40%  { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.8); }
    }

    /* Screen glow overlay */
    .vp-screen-glow {
      position: fixed;
      inset: 0;
      z-index: 50;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 40%, rgba(140, 60, 220, 0.18) 0%, rgba(100, 40, 180, 0.08) 40%, transparent 70%);
      opacity: 0;
      animation: vpScreenGlow 1.4s ease-out forwards;
    }
    @keyframes vpScreenGlow {
      0%   { opacity: 0; }
      25%  { opacity: 1; }
      70%  { opacity: 0.6; }
      100% { opacity: 0; }
    }

    /* Card light-up pulse */
    .vp-card--lit {
      animation: vpCardLightUp 1.4s ease-out forwards;
    }
    @keyframes vpCardLightUp {
      0%   { box-shadow: 0 0 0 rgba(160, 80, 240, 0); filter: brightness(1); }
      25%  { box-shadow: 0 0 30px rgba(160, 80, 240, 0.5), 0 0 60px rgba(140, 60, 220, 0.2); filter: brightness(1.25); }
      70%  { box-shadow: 0 0 15px rgba(160, 80, 240, 0.2); filter: brightness(1.1); }
      100% { box-shadow: 0 0 0 rgba(160, 80, 240, 0); filter: brightness(1); }
    }

    /* ── VP Detail Page ── */
    .vp-detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: var(--bg);
      overflow-y: auto;
    }
    .vp-detail-overlay--active { display: block; }
    .vp-detail__back {
      position: fixed;
      top: 20px;
      left: 24px;
      z-index: 205;
      background: rgba(20, 18, 16, 0.75);
      border: 1px solid var(--border);
      color: var(--beige);
      font-family: var(--font-heading);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 12px 28px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s;
      backdrop-filter: blur(8px);
    }
    .vp-detail__back:hover {
      color: var(--gold);
      border-color: rgba(212, 168, 83, 0.4);
      background: rgba(20, 18, 16, 0.9);
    }
    .vp-detail__layout {
      display: flex;
      max-width: 1100px;
      margin: 0 auto;
      padding: 100px 60px 80px;
      gap: 60px;
      min-height: 100vh;
      align-items: flex-start;
    }
    .vp-detail__visual {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 420px;
      border-radius: 8px;
      position: relative;
      overflow: hidden;
    }
    .vp-detail__visual-glow {
      position: absolute;
      inset: 0;
      border-radius: 8px;
      opacity: 0.4;
    }
    .vp-detail__visual-icon {
      position: relative;
      z-index: 1;
      font-size: 6rem;
      text-shadow: 0 0 40px rgba(200, 140, 255, 0.5);
      animation: vpDetailFloat 3s ease-in-out infinite;
    }
    @keyframes vpDetailFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .vp-detail__info {
      flex: 1;
      padding-top: 20px;
    }
    .vp-detail__badge {
      display: inline-block;
      font-family: var(--font-heading);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 3px;
      margin-bottom: 16px;
    }
    .vp-detail__name {
      font-family: var(--font-display);
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--beige);
      margin-bottom: 8px;
      line-height: 1.1;
    }
    .vp-detail__subtitle {
      font-family: var(--font-heading);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
    }
    .vp-detail__desc {
      font-family: var(--font-body);
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 32px;
      max-width: 420px;
    }
    .vp-detail__price-box {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    .vp-detail__price {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--beige);
    }
    .vp-detail__price-per {
      font-family: var(--font-body);
      font-size: 0.75rem;
      color: var(--muted);
      opacity: 0.7;
    }
    .vp-detail__buy-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: var(--font-heading);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #fff;
      background: linear-gradient(135deg, #7b2ff2, #9b59b6, #7b2ff2);
      background-size: 200% 200%;
      animation: vpBuyShimmer 3s ease infinite;
      border: none;
      border-radius: 5px;
      padding: 16px 48px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(123, 47, 242, 0.3);
      margin-bottom: 32px;
      min-width: 260px;
    }
    .vp-detail__buy-btn:hover {
      box-shadow: 0 6px 30px rgba(123, 47, 242, 0.5);
      transform: translateY(-2px);
    }
    .vp-detail__buy-btn:active {
      transform: translateY(0);
    }
    @keyframes vpBuyShimmer {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .vp-detail__meta {
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }
    .vp-detail__meta-row {
      display: flex;
      justify-content: space-between;
      font-family: var(--font-body);
      font-size: 0.78rem;
      color: var(--muted);
      padding: 6px 0;
      max-width: 320px;
    }
    .vp-detail__meta-label { opacity: 0.6; }
    .vp-detail__meta-value { color: var(--beige); }
    .vp-detail__status {
      font-family: var(--font-body);
      font-size: 0.8rem;
      min-height: 24px;
      margin-bottom: 16px;
    }

    /* ── Page Layout ── */
    .shop-page {
      max-width: 1320px;
      margin: 0 auto;
      padding: 112px 40px 100px;
    }

    /* ── Section Headers ── */
    .shop-section {
      margin-bottom: 48px;
    }

    .shop-section__header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .shop-section__title {
      font-family: var(--font-heading);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .shop-section__line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(212, 168, 83, 0.25), transparent);
    }

    .shop-section__badge {
      font-family: var(--font-display);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--green);
      padding: 3px 10px;
      border: 1px solid rgba(78, 200, 112, 0.3);
      border-radius: 2px;
      background: rgba(78, 200, 112, 0.08);
    }

    /* ── Featured Carousel ── */
    .shop-featured-carousel {
      position: relative;
    }

    .shop-grid--featured {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
    }

    .shop-grid--featured .shop-card {
      grid-column: span 2;
    }

    .shop-featured-arrow {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      color: rgba(212, 168, 83, 0.2);
      cursor: pointer;
      transition: all 0.4s;
      z-index: 10;
      border-radius: 4px;
    }
    .shop-featured-arrow svg {
      width: 36px;
      height: 36px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform 0.3s;
    }
    .shop-featured-arrow:hover {
      color: var(--gold);
    }
    .shop-featured-arrow--left {
      left: -70px;
    }
    .shop-featured-arrow--left:hover {
      background: linear-gradient(270deg, transparent, rgba(212, 168, 83, 0.1));
    }
    .shop-featured-arrow--left:hover svg { transform: translateX(-3px); }
    .shop-featured-arrow--right {
      right: -70px;
    }
    .shop-featured-arrow--right:hover {
      background: linear-gradient(90deg, transparent, rgba(212, 168, 83, 0.1));
    }
    .shop-featured-arrow--right:hover svg { transform: translateX(3px); }
    .shop-featured-arrow:disabled {
      opacity: 0.1;
      cursor: default;
      pointer-events: none;
    }

    .shop-featured-dots {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 14px;
    }
    .shop-featured-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      opacity: 0.3;
      transition: all 0.3s;
      cursor: pointer;
      border: none;
    }
    .shop-featured-dot--active {
      opacity: 1;
      background: var(--gold);
      box-shadow: 0 0 6px rgba(212, 168, 83, 0.4);
    }

    /* ── Standard Grid (portrait 9:16 cards) ── */
    .shop-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
    }

    /* ── Item Card ── */
    .shop-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .shop-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(212, 168, 83, 0.06);
    }
    .shop-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212, 168, 83, 0.2), transparent);
      opacity: 0;
      transition: opacity 0.35s;
    }
    .shop-card:hover::before { opacity: 1; }

    /* Rarity glow */
    .shop-card--mythic    { --rarity: #e85454; --rarity-bg: rgba(50, 10, 10, 0.92); }
    .shop-card--legendary { --rarity: #d4a853; --rarity-bg: rgba(40, 30, 10, 0.92); }
    .shop-card--epic      { --rarity: #c577f5; --rarity-bg: rgba(35, 15, 50, 0.92); }
    .shop-card--rare      { --rarity: #4ea8ee; --rarity-bg: rgba(12, 25, 45, 0.92); }
    .shop-card--uncommon  { --rarity: #4ec870; --rarity-bg: rgba(10, 30, 15, 0.92); }
    .shop-card--common    { --rarity: #9a8e7a; --rarity-bg: rgba(20, 18, 14, 0.92); }

    .shop-card__image {
      position: relative;
      width: 100%;
      height: 336px;
      background: radial-gradient(ellipse at center, rgba(20, 18, 16, 0.5) 0%, var(--surface) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Featured cards: same height as standard, just wider */

    .shop-card__image::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 40%;
      background: linear-gradient(transparent, var(--rarity-bg, rgba(10,9,8,0.95)));
      pointer-events: none;
    }

    /* Rarity strip at top of image */
    .shop-card__rarity-strip {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--rarity);
      box-shadow: 0 0 12px var(--rarity);
    }

    .shop-card__placeholder {
      font-size: 2.875rem;
      opacity: 0.3;
    }

    .shop-grid--featured .shop-card__placeholder {
      font-size: 4.6rem;
    }

    /* Tag (NEW / SALE / LIMITED) */
    .shop-card__tag {
      position: absolute;
      top: 10px;
      right: 10px;
      font-family: var(--font-display);
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 2px;
      z-index: 2;
    }
    .shop-card__tag--new {
      color: var(--green);
      background: rgba(78, 200, 112, 0.15);
      border: 1px solid rgba(78, 200, 112, 0.3);
    }
    .shop-card__tag--sale {
      color: var(--red);
      background: rgba(232, 84, 84, 0.15);
      border: 1px solid rgba(232, 84, 84, 0.3);
    }
    .shop-card__tag--limited {
      color: var(--gold);
      background: rgba(212, 168, 83, 0.15);
      border: 1px solid rgba(212, 168, 83, 0.3);
    }

    .shop-card__info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px 18px 18px;
      z-index: 2;
    }

    .shop-card__name {
      font-family: var(--font-heading);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--beige);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .shop-card__type {
      font-family: var(--font-body);
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      margin-bottom: 12px;
    }

    .shop-card__price-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .shop-card__price {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--purple);
    }
    .shop-card__price-icon {
      text-shadow: 0 0 8px var(--purple-glow);
    }

    .shop-card__price--old {
      font-size: 0.7rem;
      color: var(--muted);
      text-decoration: line-through;
      opacity: 0.6;
    }

    .shop-card__buy {
      font-family: var(--font-heading);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--bg);
      background: linear-gradient(135deg, var(--gold), #b8903e);
      border: none;
      border-radius: 3px;
      padding: 6px 16px;
      cursor: pointer;
      transition: all 0.3s;
      opacity: 0;
      transform: translateY(4px);
    }
    .shop-card:hover .shop-card__buy {
      opacity: 1;
      transform: translateY(0);
    }
    .shop-card__buy:hover {
      background: linear-gradient(135deg, #e4b863, #c89e4e);
      box-shadow: 0 4px 16px rgba(212, 168, 83, 0.3);
    }

    .shop-card__owned {
      font-family: var(--font-heading);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--green);
      opacity: 0.7;
    }

    /* ── Featured card tweaks ── */
    .shop-grid--featured .shop-card__info {
      padding: 20px 24px 24px;
    }
    .shop-grid--featured .shop-card__name {
      font-size: 1.2rem;
    }
    .shop-grid--featured .shop-card__price {
      font-size: 1rem;
    }

    /* ── Purchase Modal ── */
    .shop-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .shop-modal-overlay--active {
      display: flex;
      animation: fadeIn 0.2s ease;
    }

    /* ── Item Detail Page ── */
    .item-detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 190;
      background: var(--bg);
      overflow-y: auto;
    }
    .item-detail-overlay--active {
      display: block;
      animation: fadeIn 0.3s ease;
    }
    .item-detail__bg {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 55%;
      z-index: 0;
    }
    .item-detail__bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
    }
    .item-detail__bg-fallback {
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center top, rgba(60, 40, 20, 0.3) 0%, var(--bg) 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8rem;
      opacity: 0.15;
    }
    .item-detail__bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, var(--bg) 0%, rgba(10,9,8,0.7) 30%, rgba(10,9,8,0.2) 60%, transparent 100%);
    }
    .item-detail__bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, var(--bg) 0%, transparent 40%);
      z-index: 1;
    }
    .item-detail__close {
      position: fixed;
      top: 20px;
      left: 24px;
      z-index: 195;
      background: rgba(20, 18, 16, 0.75);
      border: 1px solid var(--border);
      color: var(--beige);
      font-family: var(--font-heading);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 12px 28px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s;
      backdrop-filter: blur(8px);
    }
    .item-detail__close:hover {
      color: var(--gold);
      border-color: rgba(212, 168, 83, 0.4);
      background: rgba(20, 18, 16, 0.9);
    }
    .item-detail__content {
      position: relative;
      z-index: 1;
      max-width: none;
      margin: 0;
      padding: 160px 40px 80px 360px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .item-detail__rarity-tag {
      font-family: var(--font-heading);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 2px;
      display: inline-block;
      margin-bottom: 24px;
    }
    .item-detail__rarity-tag--legendary {
      color: #f5c542;
      background: rgba(245, 197, 66, 0.12);
      border: 1px solid rgba(245, 197, 66, 0.25);
    }
    .item-detail__rarity-tag--epic {
      color: #c577f5;
      background: rgba(197, 119, 245, 0.12);
      border: 1px solid rgba(197, 119, 245, 0.25);
    }
    .item-detail__rarity-tag--rare {
      color: #4ea8ee;
      background: rgba(78, 168, 238, 0.12);
      border: 1px solid rgba(78, 168, 238, 0.25);
    }
    .item-detail__rarity-tag--common {
      color: #9a8e7a;
      background: rgba(154, 142, 122, 0.12);
      border: 1px solid rgba(154, 142, 122, 0.25);
    }
    .item-detail__name {
      font-family: var(--font-display);
      font-size: 3.2rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--beige);
      margin-bottom: 12px;
    }
    .item-detail__type {
      font-family: var(--font-heading);
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 40px;
    }
    .item-detail__desc {
      font-size: 1.15rem;
      line-height: 1.8;
      color: rgba(214, 200, 168, 0.75);
      max-width: 600px;
      margin-bottom: 48px;
    }
    .item-detail__price-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 40px;
    }
    .item-detail__price {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      color: var(--purple);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .item-detail__price-icon {
      text-shadow: 0 0 10px var(--purple-glow);
    }
    .item-detail__price--old {
      font-family: var(--font-display);
      font-size: 1.2rem;
      color: var(--muted);
      text-decoration: line-through;
      opacity: 0.6;
    }
    .item-detail__buy-btn {
      font-family: var(--font-heading);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 18px 64px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid var(--gold);
      color: var(--bg);
      background: linear-gradient(135deg, var(--gold), #b8903e);
      transition: all 0.3s;
      margin-bottom: 16px;
      display: inline-block;
    }
    .item-detail__buy-btn:hover {
      background: linear-gradient(135deg, #e4b863, #c89e4e);
      box-shadow: 0 4px 20px rgba(212, 168, 83, 0.35);
    }
    .item-detail__buy-btn--owned {
      background: transparent;
      color: var(--green);
      border-color: var(--green);
      cursor: default;
      opacity: 0.7;
    }
    .item-detail__buy-btn--owned:hover {
      background: transparent;
      box-shadow: none;
    }
    .item-detail__result {
      font-family: var(--font-heading);
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      min-height: 28px;
    }
    .item-detail__result--success { color: var(--green); }
    .item-detail__result--error   { color: var(--red); }

    .item-detail__divider {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, var(--gold), transparent);
      margin: 60px 0 40px;
    }
    .item-detail__related-title {
      font-family: var(--font-heading);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
    }
    .item-detail__related-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, 300px);
      gap: 14px;
    }
    .item-detail__related-card {
      width: 300px;
      height: 150px;
      background: rgba(20, 18, 16, 0.6);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.3s;
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .item-detail__related-card:hover {
      border-color: var(--border-hover);
      background: rgba(30, 26, 20, 0.7);
    }
    .item-detail__related-icon {
      font-size: 1.6rem;
      margin-bottom: 8px;
      opacity: 0.5;
    }
    .item-detail__related-name {
      font-family: var(--font-heading);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--beige);
      margin-bottom: 4px;
    }
    .item-detail__related-type {
      font-size: 0.7rem;
      color: var(--muted);
    }

    .shop-modal {
      background: linear-gradient(160deg, var(--surface) 0%, var(--surface-2) 100%);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 40px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      position: relative;
    }
    .shop-modal::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212, 168, 83, 0.3), transparent);
    }

    .shop-modal__icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .shop-modal__title {
      font-family: var(--font-heading);
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--beige);
      margin-bottom: 8px;
    }

    .shop-modal__desc {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .shop-modal__price {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--purple);
      margin-bottom: 24px;
    }
    .shop-modal__price-icon {
      text-shadow: 0 0 10px var(--purple-glow);
    }

    .shop-modal__actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .shop-modal__btn {
      font-family: var(--font-heading);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 10px 28px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .shop-modal__btn--confirm {
      color: var(--bg);
      background: linear-gradient(135deg, var(--gold), #b8903e);
      border: 1px solid var(--gold);
    }
    .shop-modal__btn--confirm:hover {
      background: linear-gradient(135deg, #e4b863, #c89e4e);
      box-shadow: 0 4px 16px rgba(212, 168, 83, 0.3);
    }
    .shop-modal__btn--confirm:disabled {
      background: rgba(100, 90, 70, 0.3);
      color: var(--muted);
      border-color: rgba(154, 142, 122, 0.2);
      cursor: not-allowed;
      box-shadow: none;
    }
    .shop-modal__btn--gems {
      color: var(--purple);
      background: rgba(180, 100, 255, 0.1);
      border: 1px solid rgba(180, 100, 255, 0.4);
    }
    .shop-modal__btn--gems:hover {
      background: rgba(180, 100, 255, 0.2);
      box-shadow: 0 4px 16px rgba(180, 100, 255, 0.25);
      color: #d9a0ff;
    }
    .shop-modal__btn--cancel {
      color: var(--muted);
      background: transparent;
      border: 1px solid rgba(154, 142, 122, 0.3);
    }
    .shop-modal__btn--cancel:hover {
      color: var(--beige);
      border-color: rgba(154, 142, 122, 0.5);
    }

    .shop-modal__result {
      font-family: var(--font-heading);
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-top: 16px;
      display: none;
    }
    .shop-modal__result--success { color: var(--green); }
    .shop-modal__result--error   { color: var(--red); }

    /* ── Loading ── */
    .shop-loading {
      text-align: center;
      padding: 120px 0;
      font-family: var(--font-heading);
      font-size: 1rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    /* ── Empty State ── */
    .shop-empty {
      text-align: center;
      padding: 80px 0;
      color: var(--muted);
      font-family: var(--font-heading);
      font-size: 0.9rem;
      letter-spacing: 0.08em;
    }

    /* ── Sets Layout ── */
    .shop-sets-wrapper {
      position: fixed;
      inset: 0;
      z-index: -1;
      transition: background 0.6s ease;
      pointer-events: none;
    }

    .shop-sets {
      display: flex;
      gap: 0;
      position: relative;
    }

    .shop-sets__sidebar {
      position: sticky;
      top: 100px;
      width: 48px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      align-self: flex-start;
      height: calc(100vh - 100px);
      padding: 8px 0;
      margin-right: 60px;
      margin-left: -108px;
    }

    .shop-sets__sidebar-pip {
      width: 4px;
      flex: 1;
      border-radius: 2px;
      background: rgba(255,255,255,0.08);
      cursor: pointer;
      transition: all 0.4s;
      border: none;
      position: relative;
    }
    .shop-sets__sidebar-pip::after {
      content: attr(data-label);
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--font-heading);
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .shop-sets__sidebar-pip:hover::after {
      opacity: 1;
    }
    .shop-sets__sidebar-pip--active {
      box-shadow: 0 0 12px currentColor;
    }

    .shop-sets__content {
      flex: 1;
      min-width: 0;
    }

    .shop-set-block {
      padding: 60px 40px;
      margin-bottom: 0;
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .shop-set-block__name {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 24px;
      color: #fff;
    }

    .shop-set-block__layout {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: auto auto;
      gap: 14px;
      align-items: stretch;
    }

    .shop-set-block__featured {
      grid-row: 1 / 2;
      grid-column: 1 / 3;
    }
    .shop-set-block__featured .shop-card {
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .shop-set-block__featured .shop-card__image {
      flex: 1;
      height: auto;
    }

    .shop-set-block__items {
      display: contents;
    }

    /* First 2 items beside the bundle in row 1 */
    .shop-set-block__items > .shop-card:nth-child(1) {
      grid-row: 1;
      grid-column: 3 / 4;
    }
    .shop-set-block__items > .shop-card:nth-child(2) {
      grid-row: 1;
      grid-column: 4 / 5;
    }
    /* Remaining 4 items in row 2 */
    .shop-set-block__items > .shop-card:nth-child(n+3) {
      grid-row: 2;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Responsive ── */
    @media (max-width: 1100px) {
      .shop-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 900px) {
      .shop-grid { grid-template-columns: repeat(2, 1fr); }
      .shop-grid--featured { grid-template-columns: 1fr; }
      .shop-grid--featured .shop-card { grid-column: span 1; }
      .shop-page { padding: 24px 20px 80px; }
      .shop-bar { padding: 12px 20px; }
      .shop-tabs { flex-wrap: wrap; padding: 12px 20px; }
    }

    /* ── Login Modal ── */
    .login-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(12px);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }
    .login-modal-overlay--active {
      display: flex;
      animation: fadeIn 0.25s ease;
    }

    .login-modal {
      background: linear-gradient(160deg, var(--surface) 0%, var(--surface-2) 100%);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 48px 40px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      position: relative;
    }
    .login-modal::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212, 168, 83, 0.3), transparent);
    }

    .login-modal__icon {
      font-size: 2.5rem;
      margin-bottom: 20px;
      opacity: 0.6;
    }

    .login-modal__title {
      font-family: var(--font-heading);
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--beige);
      margin-bottom: 10px;
    }

    .login-modal__desc {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .login-modal__steam-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-heading);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;

    let playerItems = {};

    // Handle payment redirect (legacy) and claim pending VP orders
    (function checkPaymentResult() {
      const params = new URLSearchParams(window.location.search);
      const payment = params.get('payment');
      if (payment === 'success') {
        const pearls = params.get('pearls') || '';
        showPaymentBanner('success', pearls);
        window.history.replaceState({}, '', '/shop.html');
      } else if (payment === 'error') {
        showPaymentBanner('error');
        window.history.replaceState({}, '', '/shop.html');
      }

      // Auto-claim: check for pending VP order in localStorage
      const pendingOrder = localStorage.getItem('pending_vp_order');
      if (pendingOrder) {
        claimPendingPearls(pendingOrder);
      }
    })();

    function showPaymentBanner(type, pearls) {
      const banner = document.createElement('div');
      if (type === 'success') {
        banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:999;padding:14px 40px;background:rgba(78,200,112,0.15);border-bottom:1px solid rgba(78,200,112,0.4);color:#4ec870;font-family:var(--font-heading);font-size:0.9rem;font-weight:600;letter-spacing:0.08em;text-align:center;animation:fadeIn 0.3s ease;';
        banner.textContent = pearls ? `${parseInt(pearls).toLocaleString()} Void Pearls added to your account!` : 'Payment successful!';
      } else {
        banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:999;padding:14px 40px;background:rgba(232,84,84,0.15);border-bottom:1px solid rgba(232,84,84,0.4);color:#e85454;font-family:var(--font-heading);font-size:0.9rem;font-weight:600;letter-spacing:0.08em;text-align:center;animation:fadeIn 0.3s ease;';
        banner.textContent = 'Payment could not be processed. Please try again.';
      }
      document.body.appendChild(banner);
      setTimeout(() => banner.remove(), 6000);
    }

    function claimPendingPearls(orderId) {
      fetch('/auth/claim-pearls', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ order_id: orderId }),
      })
        .then(r => r.json().then(d => ({ status: r.status, data: d })))
        .then(({ status, data }) => {
          if (data.success) {
            // Pearls credited!
            localStorage.removeItem('pending_vp_order');
            showPaymentBanner('success', String(data.pearls));
            // Refresh balance display
            fetch('/auth/me').then(r => r.json()).then(u => {
              if (u.currencies) {
                const vpEl = document.getElementById('vpBalance');
                if (vpEl) vpEl.textContent = parseInt(u.currencies.curr03 || u.currencies.Curr03 || 0).toLocaleString();
              }
            }).catch(() => {});
          } else if (data.status === 'already_claimed') {
            localStorage.removeItem('pending_vp_order');
          } else if (data.status === 'pending') {
            // Payment not done yet — keep in localStorage for next load
            console.log('VP order still pending payment');
          } else {
            // Some other error — remove to avoid infinite retries
            localStorage.removeItem('pending_vp_order');
          }
        })
        .catch(() => {});

          return fetch('/auth/shop-data').then(r => r.json());

    function updateFeaturedCarousel() {
      const grid = document.getElementById('featuredGrid');
      if (!grid) return;
      const visible = featuredItems.slice(featuredPage, featuredPage + 2);
      grid.innerHTML = visible.map(i => cardHTML(i)).join('');
      bindCardEvents(grid);

      const maxPage = Math.max(0, featuredItems.length - 2);
      const prev = document.getElementById('featuredPrev');
      const next = document.getElementById('featuredNext');
      if (prev) prev.disabled = featuredPage <= 0;
      if (next) next.disabled = featuredPage >= maxPage;

      // Update dots
      document.querySelectorAll('.shop-featured-dot').forEach(d => {
        d.classList.toggle('shop-featured-dot--active', parseInt(d.dataset.page) === featuredPage);
      });
    }

    function bindCarouselEvents() {
      const prev = document.getElementById('featuredPrev');
      const next = document.getElementById('featuredNext');
      if (prev) prev.addEventListener('click', () => { featuredPage--; updateFeaturedCarousel(); });
      if (next) next.addEventListener('click', () => { featuredPage++; updateFeaturedCarousel(); });
      document.querySelectorAll('.shop-featured-dot').forEach(d => {
        d.addEventListener('click', () => { featuredPage = parseInt(d.dataset.page); updateFeaturedCarousel(); });
      });
    }

    function findItemById(id) {
      const fromShop = SHOP_ITEMS.find(i => i.id === id);
      if (fromShop) return fromShop;
      for (const s of SHOP_SETS) {
        const feat = Array.isArray(s.featured) ? s.featured[0] : s.featured;
        if (feat.id === id) return feat;
        const fromSet = s.items.find(i => i.id === id);
        if (fromSet) return fromSet;
      }
      return null;
    }

    function bindCardEvents(container) {
      container.querySelectorAll('[data-item-id]').forEach(card => {
        card.addEventListener('click', () => {
          const item = findItemById(card.dataset.itemId);
          if (item) openItemDetail(item);
        });
      });
    }

    /* ── Find collection containing an item ── */
    function findCollectionForItem(item) {
      for (const s of SHOP_SETS) {
        const feat = Array.isArray(s.featured) ? s.featured[0] : s.featured;
        if (feat.id === item.id) return s;
        if (s.items.some(i => i.id === item.id)) return s;
      }
      // Check if standalone armor matches a set by name pattern
      for (const s of SHOP_SETS) {
        const allSetItems = [Array.isArray(s.featured) ? s.featured[0] : s.featured, ...s.items];
        if (allSetItems.some(i => i.name === item.name || i.image === item.image)) return s;
      }
      return null;
    }

      document.getElementById('itemDetailRarity').innerHTML =

      document.getElementById('itemDetailName').textContent = item.name;
      document.getElementById('itemDetailType').textContent = item.type;
      document.getElementById('itemDetailDesc').textContent = item.desc;

        })
          .then(r => r.json())
          .then(data => {
            if (data.checkout_url) {
              if (data.order_id) localStorage.setItem('pending_vp_order', data.order_id);
              window.location.href = data.checkout_url;
            } else {
              status.textContent = data.error || 'Failed to create checkout';
              status.style.color = 'var(--red)';
              btn.textContent = 'Buy Now';
              btn.style.pointerEvents = '';
            }
          })
          .catch(() => {
            status.textContent = 'Network error. Try again.';
            status.style.color = 'var(--red)';
            btn.textContent = 'Buy Now';
            btn.style.pointerEvents = '';
          });
      };
      btn.addEventListener('click', _vpBuyHandler);
      btn.textContent = 'Buy Now';
      btn.style.pointerEvents = '';

      document.getElementById('vpDetailOverlay').classList.add('vp-detail-overlay--active');
      document.getElementById('vpDetailOverlay').scrollTop = 0;
      document.body.style.overflow = 'hidden';
    }

    function closeVpDetail() {
      document.getElementById('vpDetailOverlay').classList.remove('vp-detail-overlay--active');
      document.body.style.overflow = '';
    }

    document.getElementById('vpDetailBack').addEventListener('click', closeVpDetail);

    document.getElementById('itemDetailClose').addEventListener('click', closeItemDetail);
    document.getElementById('itemDetailOverlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeItemDetail();
    });

    function purchaseFromDetail(item) {
      const btn = document.getElementById('itemDetailBuyBtn');
      const result = document.getElementById('itemDetailResult');
      const price = item.salePrice || item.price;

      if (playerCurr03 < price) {
        result.className = 'item-detail__result item-detail__result--error';
        result.textContent = 'Insufficient balance';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Processing…';
      result.textContent = '';

      fetch('/auth/shop-buy', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ item_id: item.id }),
      })
        .then(r => {
          if (!r.ok) return r.text().then(t => { throw new Error(`HTTP ${r.status}: ${t.slice(0,200)}`); });
          return r.json();
        })
        .then(data => {
          if (data.success) {
            result.className = 'item-detail__result item-detail__result--success';
            result.textContent = 'Purchase successful!';
            playerCurr03 = data.new_balance;
            document.getElementById('walletAmount').textContent = playerCurr03.toLocaleString();
            playerItems[item.id] = '1';
            setTimeout(() => {
              closeItemDetail();
              renderShop();
            }, 1200);
          } else {
            result.className = 'item-detail__result item-detail__result--error';
            result.textContent = data.error || 'Purchase failed';
            btn.disabled = false;
            btn.textContent = 'Purchase';
          }
        })
        .catch((err) => {
          result.className = 'item-detail__result item-detail__result--error';
          result.textContent = err.message || 'Network error';
          btn.disabled = false;
          btn.textContent = 'Purchase';
        });
    }

    /* ── Sets View ── */
    function renderSetsView(container) {
      let sets = SHOP_SETS;
      if (searchQuery) {
        sets = sets.filter(s =>
          s.name.toLowerCase().includes(searchQuery) ||
          s.featured.name.toLowerCase().includes(searchQuery) ||
          s.items.some(i => i.name.toLowerCase().includes(searchQuery))
        );
      }
      if (!sets.length) {
        container.innerHTML = '<div class="shop-empty">No sets found</div>';
        return;
      }

      const sidebarPips = sets.map((s, i) =>
        `<button class="shop-sets__sidebar-pip${i === 0 ? ' shop-sets__sidebar-pip--active' : ''}" data-set-idx="${i}" data-label="${s.name}" style="background: ${i === 0 ? s.color : 'rgba(255,255,255,0.08)'}; color: ${s.color};"></button>`
      ).join('');

      const blocks = sets.map((s, i) => `
        <div class="shop-set-block" data-set-idx="${i}">
          <div class="shop-set-block__name">${s.name}</div>
          <div class="shop-set-block__layout">
            <div class="shop-set-block__featured">
              ${cardHTML(Array.isArray(s.featured) ? s.featured[0] : s.featured)}
            </div>
            <div class="shop-set-block__items">
              ${s.items.map(item => cardHTML(item)).join('')}
            </div>
          </div>
        </div>
      `).join('');

      container.innerHTML = `
        <div class="shop-sets-wrapper" id="setsBgLayer"></div>
        <div class="shop-sets">
          <div class="shop-sets__sidebar" id="setsSidebar">${sidebarPips}</div>
          <div class="shop-sets__content" id="setsContent">${blocks}</div>
        </div>`;

      bindCardEvents(container);
      initSetsScrollSpy(sets);
    }

    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return [r, g, b];
    }

    function lerpColor(c1, c2, t) {
      return [
        Math.round(c1[0] + (c2[0] - c1[0]) * t),
        Math.round(c1[1] + (c2[1] - c1[1]) * t),
        Math.round(c1[2] + (c2[2] - c1[2]) * t),
      ];
    }

    function initSetsScrollSpy(sets) {
      const blocks = document.querySelectorAll('.shop-set-block');
      const pips = document.querySelectorAll('.shop-sets__sidebar-pip');
      const bgLayer = document.getElementById('setsBgLayer');
      const colors = sets.map(s => hexToRgb(s.color));

      // Click pip to scroll to set
      pips.forEach(pip => {
        pip.addEventListener('click', () => {
          const idx = parseInt(pip.dataset.setIdx);
          blocks[idx].scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      });

      function applyBg(rgb, t) {
        // t: 0 = full color, 1 = transitioning out
        const alpha = 0.35;
        bgLayer.style.background = `
          radial-gradient(ellipse 120% 80% at 50% 40%,
            rgba(${rgb[0]},${rgb[1]},${rgb[2]},${alpha}) 0%,
            rgba(${rgb[0]},${rgb[1]},${rgb[2]},${alpha * 0.6}) 30%,
            rgba(${rgb[0]},${rgb[1]},${rgb[2]},${alpha * 0.2}) 60%,
            rgba(10,10,15,0.98) 100%)`;
      }

      // Set initial background
      applyBg(colors[0]);

      let activeIdx = 0;
      let ticking = false;

      function onScroll() {
        if (ticking) return;
        ticking = true;
        requestAnimationFrame(() => {
          const viewBottom = window.innerHeight;

          // Find which set's first row is fully visible
          // Transition triggers when 100% of the next set's first row is on screen
          let currentIdx = 0;

          for (let i = blocks.length - 1; i >= 0; i--) {
            const rect = blocks[i].getBoundingClientRect();
            // First row is approximately the top 55% of the block (title + first grid row)
            const firstRowBottom = rect.top + Math.min(rect.height * 0.55, 500);

            if (firstRowBottom < viewBottom && rect.top < viewBottom * 0.7) {
              currentIdx = i;
              break;
            }
          }

          // Calculate blend: only blend when the next set's first row starts appearing
          let blendedColor = colors[currentIdx];

          if (currentIdx < blocks.length - 1) {
            const nextRect = blocks[currentIdx + 1].getBoundingClientRect();
            const nextFirstRowBottom = nextRect.top + Math.min(nextRect.height * 0.55, 500);

            if (nextRect.top < viewBottom) {
              // Next set is entering screen — blend based on how revealed the first row is
              const revealProgress = Math.max(0, Math.min(1, (viewBottom - nextRect.top) / (nextFirstRowBottom - nextRect.top)));
              // Only start blending after first row is 100% revealed
              if (revealProgress >= 1) {
                blendedColor = colors[currentIdx + 1];
                currentIdx = currentIdx + 1;
              }
            }
          }

          applyBg(blendedColor);

          // Update pips
          if (currentIdx !== activeIdx) {
            activeIdx = currentIdx;
            pips.forEach((p, i) => {
              const isActive = i === currentIdx;
              p.classList.toggle('shop-sets__sidebar-pip--active', isActive);
              p.style.background = isActive ? sets[i].color : 'rgba(255,255,255,0.08)';
            });
          }

          ticking = false;
        });
      }

      window.addEventListener('scroll', onScroll, { passive: true });

      // Cleanup when leaving sets view
      const cleanupObserver = new MutationObserver(() => {
        if (!document.getElementById('setsBgLayer')) {
          window.removeEventListener('scroll', onScroll);
          cleanupObserver.disconnect();
        }
      });
      cleanupObserver.observe(container, { childList: true });
    }

    function getSetColorForItem(item) {
      for (const s of SHOP_SETS) {
        const feat = Array.isArray(s.featured) ? s.featured[0] : s.featured;
        if (feat.id === item.id || s.items.some(i => i.id === item.id)) return s.color;
        // Match standalone armors by image
        if (item.image && [feat, ...s.items].some(i => i.image === item.image)) return s.color;
      }
      return null;
    }

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function cardHTML(item) {
      const owned = playerItems[item.id];
      const effectivePrice = item.salePrice || item.price;
      const tagHTML = item.tag
        ? `<div class="shop-card__tag shop-card__tag--${item.tag}">${item.tag}</div>`
        : '';
      const setColor = getSetColorForItem(item);
      const bgStyle = setColor ? `style="--rarity-bg: ${hexToRgba(setColor, 0.92)}"` : '';

      return `
        <div class="shop-card shop-card--${item.rarity}" data-item-id="${item.id}" ${bgStyle}>
          <div class="shop-card__image">
            <div class="shop-card__rarity-strip"></div>
            ${tagHTML}
            ${item.image ? `<img src="${item.image}" alt="${item.name}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;filter:blur(0.3px);" />` : `<span class="shop-card__placeholder">${item.icon}</span>`}
          </div>
          <div class="shop-card__info">
            <div class="shop-card__name">${item.name}</div>
            <div class="shop-card__type">${item.type}</div>
            <div class="shop-card__price-row">
              <div style="display:flex;align-items:center;gap:8px;">
                <span class="shop-card__price">
                  <span class="shop-card__price-icon">✦</span> ${effectivePrice.toLocaleString()}
                </span>
                ${item.salePrice ? `<span class="shop-card__price--old">${item.price.toLocaleString()}</span>` : ''}
              </div>
              ${owned
                ? '<span class="shop-card__owned">Owned</span>'
                : '<button class="shop-card__buy">Purchase</button>'}
            </div>
          </div>
        </div>`;
    }

    /* ── Purchase Modal ── */
    function openPurchaseModal(item) {
      if (!isLoggedIn) {
        showLoginModal();
        return;
      }
      const owned = playerItems[item.id];
      if (owned) return;

      const modal = document.getElementById('purchaseModal');
      document.getElementById('modalIcon').textContent = item.icon;
      document.getElementById('modalTitle').textContent = item.name;
      document.getElementById('modalDesc').textContent = item.desc;
      document.getElementById('modalPrice').textContent = (item.salePrice || item.price).toLocaleString();

      const result = document.getElementById('modalResult');
      result.style.display = 'none';

      const actions = document.getElementById('modalActions');
      const price = item.salePrice || item.price;
      if (playerCurr03 < price) {
        actions.innerHTML = `
          <button class="shop-modal__btn shop-modal__btn--gems" id="modalGetGems">Get Void Pearls</button>
          <button class="shop-modal__btn shop-modal__btn--cancel" id="modalCancelInsuf">Cancel</button>
        `;
        document.getElementById('modalGetGems').addEventListener('click', () => {
          modal.classList.remove('shop-modal-overlay--active');
          closeItemDetail();
          document.querySelectorAll('.shop-tab').forEach(t => t.classList.remove('shop-tab--active'));
          const gemsTab = document.querySelector('.shop-tab[data-cat="gems"]');
          if (gemsTab) { gemsTab.classList.add('shop-tab--active'); }
          currentCategory = 'gems';
          renderShop();
        });
        document.getElementById('modalCancelInsuf').addEventListener('click', () => {
          modal.classList.remove('shop-modal-overlay--active');
        });
      } else {
        actions.innerHTML = `
          <button class="shop-modal__btn shop-modal__btn--confirm" id="modalConfirm">Purchase</button>
          <button class="shop-modal__btn shop-modal__btn--cancel" id="modalCancel">Cancel</button>
        `;
        document.getElementById('modalCancel').addEventListener('click', () => {
          modal.classList.remove('shop-modal-overlay--active');
        });
        document.getElementById('modalConfirm').addEventListener('click', () => {
          confirmPurchase(modal);
        });
      }
      actions.style.display = 'flex';

      modal.classList.add('shop-modal-overlay--active');
      modal.dataset.itemId = item.id;
    }

    document.getElementById('purchaseModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) {
        e.currentTarget.classList.remove('shop-modal-overlay--active');
      }
    });

    function confirmPurchase(modal) {
      const itemId = modal.dataset.itemId;
      const item = SHOP_ITEMS.find(i => i.id === itemId);
      if (!item) return;

      const price = item.salePrice || item.price;
      const result = document.getElementById('modalResult');
      const actions = document.getElementById('modalActions');

      // Call purchase API
      actions.style.display = 'none';
      result.className = 'shop-modal__result';
      result.textContent = 'Processing…';
      result.style.display = 'block';

      fetch('/auth/shop-buy', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ item_id: itemId }),
      })
        .then(r => {
          if (!r.ok) return r.text().then(t => { throw new Error(`HTTP ${r.status}: ${t.slice(0,200)}`); });
          return r.json();
        })
        .then(data => {
          if (data.success) {
            result.className = 'shop-modal__result shop-modal__result--success';
            result.textContent = 'Purchase successful!';
            playerCurr03 = data.new_balance;
            document.getElementById('walletAmount').textContent = playerCurr03.toLocaleString();
            playerItems[itemId] = '1';
            setTimeout(() => {
              modal.classList.remove('shop-modal-overlay--active');
              renderShop();
            }, 1200);
          } else {
            result.className = 'shop-modal__result shop-modal__result--error';
            result.textContent = data.error || 'Purchase failed';
            actions.style.display = 'flex';
          }
        })
        .catch((err) => {
          result.className = 'shop-modal__result shop-modal__result--error';
          result.textContent = err.message || 'Network error';
          actions.style.display = 'flex';
        });
    }
  </script>
